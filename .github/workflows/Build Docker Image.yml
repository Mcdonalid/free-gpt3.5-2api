name: Build Docker Image

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  actions: write

jobs:
  main:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.head_commit.message, 'release-v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Docker Image Tag
        shell: bash
        id: get_docker_image_tag
        env:
          RELEASE_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            release_tag="release-v${GITHUB_SHA::7}"
          else
            release_tag="$(printf '%s' "$RELEASE_MESSAGE" | head -n 1 | awk '{print $1}')"
          fi
          echo "tag=${release_tag#release-v}" >> "$GITHUB_OUTPUT"

      - name: Get Docker Image Repository
        shell: bash
        id: get_docker_image_repo
        env:
          GHCR_REPO_SECRET: ${{ secrets.GHCR_REPO }}
        run: |
          if [ -n "$GHCR_REPO_SECRET" ]; then
            image_repo="$GHCR_REPO_SECRET"
          else
            image_repo="ghcr.io/${{ github.repository }}"
          fi
          image_repo="$(printf '%s' "$image_repo" | tr '[:upper:]' '[:lower:]')"
          echo "repo=$image_repo" >> "$GITHUB_OUTPUT"

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login To GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Cache Docker Layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: "${{ runner.os }}-buildx-${{ github.sha }}"
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker Image And Push To GHCR
        uses: docker/build-push-action@v5
        with:
          push: true
          context: .
          platforms: linux/amd64,linux/arm64
          file: Dockerfile
          tags: |
            ${{ steps.get_docker_image_repo.outputs.repo }}:latest
            ${{ steps.get_docker_image_repo.outputs.repo }}:${{ steps.get_docker_image_tag.outputs.tag }}
            ${{ steps.get_docker_image_repo.outputs.repo }}:${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max

      - name: Delete Workflow Runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 8
